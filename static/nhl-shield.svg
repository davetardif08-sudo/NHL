<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 270">
  <defs>
    <linearGradient id="nhlShield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M 55 15 L 165 15 L 190 75 L 190 155 Q 110 245 110 245 Q 110 245 30 155 L 30 75 Z"
        fill="url(#nhlShield)" stroke="#c41e3a" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- Inner border highlight -->
  <path d="M 60 22 L 160 22 L 182 75 L 182 150 Q 110 235 110 235 Q 110 235 38 150 L 38 75 Z"
        fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- Diagonal stripe (classic NHL design element) -->
  <line x1="75" y1="30" x2="145" y2="210" stroke="#c41e3a" stroke-width="4" opacity="0.8"/>

  <!-- NHL Text in classic serif font, positioned diagonally -->
  <g transform="translate(110, 140) rotate(-20)">
    <text x="0" y="0" font-size="88" font-weight="900" text-anchor="middle" fill="#ffffff"
          font-family="Georgia, serif" letter-spacing="2">NHL</text>
  </g>

  <!-- Top accent circle -->
  <circle cx="110" cy="18" r="3" fill="#c41e3a"/>

  <!-- Bottom accent -->
  <circle cx="110" cy="240" r="2.5" fill="#c41e3a"/>

  <!-- Side accent lines -->
  <line x1="32" y1="85" x2="40" y2="95" stroke="#c41e3a" stroke-width="1.5" opacity="0.6"/>
  <line x1="188" y1="85" x2="180" y2="95" stroke="#c41e3a" stroke-width="1.5" opacity="0.6"/>
</svg>
